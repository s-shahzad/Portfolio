[build]
  publish = "."
  command = "echo \"No build step required\""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://stats.g.doubleclick.net; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# --- Block non-public paths from being served at the public URL ---
# The site publishes the repo root, so backend source, ops scripts, runbooks,
# build config, and local data would otherwise be fetchable. Each rule returns
# the 404 page with force=true so nothing here is ever served.
[[redirects]]
  from = "/admin.html"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/src/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/ops/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/logs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/backups/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/contact_messages/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/RUNBOOK.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/AGENTS.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/render.yaml"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/render.env.example"
  to = "/404.html"
