# Netlify root-level splats do not reliably match "/*.ps1", so block each
# PowerShell file at the repo root explicitly.
[[redirects]]
  from = "/deploy.ps1"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/deploy-staging.ps1"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/start-server.ps1"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/portfolio.env.local.ps1"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/portfolio.env.local.ps1.example"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/portfolio.env.staging.ps1.example"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/portfolio/*"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/reports/assets/Azhad_Shaik_Detection_Engineer_Resume.pdf"
  to = "/reports/assets/Azhad%20Shahzad%20Shaik%20CV.pdf"
  status = 301
  force = true
